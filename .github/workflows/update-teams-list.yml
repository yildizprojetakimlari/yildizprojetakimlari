name: Update Teams List

on:
  push:
    paths:
      - 'content/teams/**.json'
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate teamsList.json
        run: node tools/generate-teams.js

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update teamsList.json"
          file_pattern: 'content/teamsList.json'
